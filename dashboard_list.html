<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CFO Dashboard - Carbon Footprint for Organization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .scope-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .scope-card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-t from-emerald-200 to-white text-slate-900 flex flex-col">

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-emerald-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-3">
                    <button onclick="history.back()" class="p-2 rounded-full hover:bg-emerald-50 text-slate-500 hover:text-emerald-800 transition-all duration-200 focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <span class="text-xl md:text-2xl font-bold tracking-tight text-emerald-800">CFO Dashboard</span>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-slate-600 hover:text-emerald-600 font-medium transition-colors">หน้าแรก</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 py-12 w-full">
        
        <div class="text-center mb-16">
            <h1 class="text-3xl md:text-3xl font-extrabold text-slate-900 mb-4">
                แดชบอร์ดสรุปข้อมูล
            </h1>
            <div class="w-24 h-1.5 bg-emerald-500 mx-auto rounded-full mt-6"></div>
        </div>

        <!-- Scope Selection Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            
            <!-- Scope 1 Card -->
            <div onclick="window.location.href='dashboard_scope1.html'" class="scope-card cursor-pointer group bg-sky-200 border border-white/50 p-8 rounded-[2.5rem] shadow-xl shadow-sky-200/30 flex flex-col h-full">
                <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-blue-600 group-hover:text-white transition-all shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
                        <path d="M12 12v9"/>
                        <path d="m8 17 4 4 4-4"/>
                    </svg>
                </div>
                <h3 class="text-3xl font-bold text-slate-800 mb-2">Dashboard Scope 1</h3>
                <p class="font-semibold text-blue-700 mb-4 uppercase tracking-wider text-sm">Direct Emissions</p>
                <div class="flex items-center font-bold text-slate-900 group-hover:text-blue-700 transition-colors gap-2">
                    เข้าดู Dashboard
                </div>
            </div>

            <!-- Scope 2 Card -->
            <div onclick="window.location.href='cfo_scope2.html'" class="scope-card cursor-pointer group bg-green-200 border border-white/50 p-8 rounded-[2.5rem] shadow-xl shadow-green-200/30 flex flex-col h-full">
                <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                </div>
                <h3 class="text-3xl font-bold text-slate-800 mb-2">Dashboard Scope 2</h3>
                <p class="font-semibold text-emerald-700 mb-4 uppercase tracking-wider text-sm">Indirect Energy</p>
                <div class="flex items-center font-bold text-slate-900 group-hover:text-emerald-700 transition-colors gap-2">
                    เข้าดู Dashboard
                </div>
            </div>

            <!-- Scope 3 Card -->
            <div onclick="window.location.href='cfo_scope3.html'" class="scope-card cursor-pointer group bg-lime-100 border border-white/50 p-8 rounded-[2.5rem] shadow-xl shadow-lime-200/30 flex flex-col h-full">
                <div class="w-16 h-16 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-amber-600 group-hover:text-white transition-all shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <h3 class="text-3xl font-bold text-slate-800 mb-2">Dashboard Scope 3</h3>
                <p class="font-semibold text-amber-700 mb-4 uppercase tracking-wider text-sm">Other Indirect</p>
                <div class="flex items-center font-bold text-slate-900 group-hover:text-amber-700 transition-colors gap-2">
                    เข้าดู Dashboard
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="mb-4">Created by Mr.Kasama Krueapueng</p>
            <div class="flex justify-center gap-6 text-sm">
                <a href="#" class="hover:text-white transition-colors">Meajo University</a>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
