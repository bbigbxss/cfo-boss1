<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emission Factor Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .scope-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .scope-card:hover {
            transform: translateY(-10px);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex items-center gap-2">
                    <button onclick="history.back()" class="p-2 rounded-full hover:bg-slate-100 text-slate-500 hover:text-emerald-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <span class="text-2xl md:text-2xl font-bold tracking-tight text-emerald-800">CFO Emission Factors</span>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="text-slate-600 hover:text-emerald-600 transition-colors">หน้าแรก</a>
                    <a href="emission_factors.html" class="text-slate-600 hover:text-emerald-600 transition-colors">Emission factors</a>
                </div>
            </div>
        </div>
    </nav>

    <div id="app" class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">Emission Factor</h1>
                <p class="text-slate-500 mt-1">อ้างอิงข้อมูล: องค์การบริหารจัดการก๊าซเรือนกระจก (TGO)</p>
            </div>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-center">
            <div class="relative flex-1 w-full">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="ค้นหาชื่อรายการ หรือหมวดหมู่..."
                    class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all"
                >
            </div>
            
            <div id="categoryFilters" class="flex gap-2 w-full md:w-auto overflow-x-auto pb-2 md:pb-0 no-scrollbar">
                </div>
        </div>

        <div id="loadingStatus" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600"></div>
            <p class="mt-4 text-slate-500">กำลังโหลดข้อมูลจากฐานข้อมูล...</p>
        </div>

        <div id="tableContainer" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200">
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">หมวดหมู่</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">รายการ</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">หน่วย</th>
                            <th class="px-6 py-4 text-xs font-semibold text-blue-600 uppercase tracking-wider text-right">CO₂</th>
                            <th class="px-6 py-4 text-xs font-semibold text-orange-600 uppercase tracking-wider text-right">CH₄</th>
                            <th class="px-6 py-4 text-xs font-semibold text-purple-600 uppercase tracking-wider text-right">N₂O</th>
                            <th class="px-6 py-4 text-xs font-bold text-emerald-800 uppercase tracking-wider text-right">Total (kgCO₂e)</th>
                            <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">คัดลอก</th>
                        </tr>
                    </thead>
                    <tbody id="efTableBody" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            <div id="noData" class="px-6 py-12 text-center text-slate-400 italic hidden">
                ไม่พบข้อมูลที่ค้นหา
            </div>
        </div>

        <footer class="mt-12 py-12 border-t border-slate-200">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-slate-500 mb-4">Created by Mr.Kasama Krueapueng</p>
                <div class="flex justify-center gap-6 text-sm">
                    <a href="#" class="text-slate-400 hover:text-emerald-600 transition-colors">Maejo University</a>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const SUPABASE_URL = "https://ufglhklqraqudlxkylzw.supabase.co"; 
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ2xoa2xxcmFxdWRseGt5bHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NTY2MzUsImV4cCI6MjA4MjUzMjYzNX0._WxWgfvgonGFmQlXfLOSuKH4QqS6sWF3GOxnNPW6si8";

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let efData = [];
let currentFilter = "All";
let currentSearch = "";
const categories = ["All", "Stationary Combustion", "Mobile Combustion Off-road", "Electricity", "Refrigerant"];

// DOM Elements
const tableBody = document.getElementById('efTableBody');
const loadingStatus = document.getElementById('loadingStatus');
const tableContainer = document.getElementById('tableContainer');
const searchInput = document.getElementById('searchInput');
const categoryFilters = document.getElementById('categoryFilters');
const noData = document.getElementById('noData');

// --- 2. DATA FETCHING ---
async function fetchEFData() {
    try {
        const { data, error } = await supabaseClient
            .from('emission_factors')
            .select('*')
            .order('category', { ascending: true });

        if (error) throw error;

        efData = data || [];
        renderFilters();
        renderTable();
        
        loadingStatus.classList.add('hidden');
        tableContainer.classList.remove('hidden');

    } catch (error) {
        console.error("Error:", error.message);
        loadingStatus.innerHTML = `
            <div class="text-center text-red-500 p-8 bg-red-50 rounded-xl border border-red-100">
                <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                <p class="font-bold">เกิดข้อผิดพลาดในการดึงข้อมูล</p>
                <p class="text-sm">${error.message}</p>
            </div>
        `;
    }
}

// --- 3. RENDERING ---
function renderTable() {
    const filtered = efData.filter(item => {
        const name = item.fuel_name ? item.fuel_name.toLowerCase() : ""; // ใช้ fuel_name ตามโครงสร้างข้อมูลคุณ
        const category = item.category ? item.category.toLowerCase() : "";
        const search = currentSearch.toLowerCase();
        
        const matchesSearch = name.includes(search) || category.includes(search);
        const matchesCategory = currentFilter === "All" || item.category === currentFilter;
        
        return matchesSearch && matchesCategory;
    });

    tableBody.innerHTML = "";
    
    if (filtered.length === 0) {
        noData.classList.remove('hidden');
        return;
    }

    noData.classList.add('hidden');
    filtered.forEach(item => {
        // ฟังก์ชันช่วยจัดการตัวเลข (ถ้าไม่มีค่าให้เป็น 0.0000)
        const formatNum = (val) => {
            const num = parseFloat(val);
            return isNaN(num) ? '0.0000' : num.toFixed(4);
        };

        const row = document.createElement('tr');
        row.className = "hover:bg-slate-50 transition-colors group";
        row.innerHTML = `
            <td class="px-6 py-4">
                <span class="text-[10px] font-bold px-2 py-1 bg-slate-100 text-slate-500 rounded-full uppercase tracking-tighter">
                    ${item.category || '-'}
                </span>
            </td>
            <td class="px-6 py-4">
                <div class="font-semibold text-slate-900">${item.fuel_name || 'ไม่ระบุชื่อ'}</div>
                <div class="text-[10px] text-slate-400 mt-0.5 uppercase italic">${item.ref || 'TGO'}</div>
            </td>
            <td class="px-6 py-4 text-center">
                <span class="text-xs font-mono text-slate-600 bg-slate-50 px-2 py-1 rounded border border-slate-100">
                    ${item.unit || '-'}
                </span>
            </td>
            <td class="px-6 py-4 text-right text-sm font-mono text-blue-600">
                ${formatNum(item.co2)}
            </td>
            <td class="px-6 py-4 text-right text-sm font-mono text-orange-600">
                ${formatNum(item.ch4)}
            </td>
            <td class="px-6 py-4 text-right text-sm font-mono text-purple-600">
                ${formatNum(item.n2o)}
            </td>
            <td class="px-6 py-4 text-right text-sm font-mono font-bold text-emerald-700">
                ${formatNum(item.total_co2eq)}
            </td>
            <td class="px-6 py-4 text-center">
                <button onclick="copyVal('${item.fuel_name}', ${item.total || 0}, '${item.unit || '-'}')" 
                        class="text-slate-300 hover:text-emerald-600 transition-all transform hover:scale-110">
                    <i class="far fa-copy"></i>
                </button>
            </td>
        `;
        tableBody.appendChild(row);
    });
}

function renderFilters() {
    categoryFilters.innerHTML = "";
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.textContent = cat === "All" ? "ทั้งหมด" : cat;
        const isActive = currentFilter === cat;
        btn.className = `px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-all border ${
            isActive ? "bg-emerald-600 text-white border-emerald-600 shadow-md shadow-emerald-100" 
                     : "bg-white text-slate-600 border-slate-200 hover:bg-slate-50"
        }`;
        btn.onclick = () => {
            currentFilter = cat;
            renderFilters();
            renderTable();
        };
        categoryFilters.appendChild(btn);
    });
}

window.copyVal = (name, total, unit) => {
    const text = `${name}: ${total} kgCO2eq/${unit}`;
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.createElement('div');
        toast.className = "fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-xs shadow-2xl z-50 flex items-center animate-bounce";
        toast.innerHTML = `<i class="fas fa-check-circle text-emerald-400 mr-2"></i> คัดลอกแล้ว: ${text}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    });
};


searchInput.addEventListener('input', (e) => {
    currentSearch = e.target.value;
    renderTable();
});
window.onload = fetchEFData;
    </script>
</body>
</html>
