    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Data object (preserved from original code)
        const data = {
            'generator': {
                title: 'เครื่องปั่นไฟ (Generator)',
                desc: 'บันทึกการใช้น้ำมันเชื้อเพลิงสำหรับเครื่องจักรและเครื่องปั่นไฟสำรอง',
                icon: 'zap',
                colorClass: 'bg-yellow-50',
                iconColor: 'text-yellow-500',
                type: 'fuel'
            },
            'cars': {
                title: 'รถยนต์ส่วนกลาง (Company Cars)',
                desc: 'บันทึกระยะทางหรือปริมาณน้ำมันเชื้อเพลิงที่ใช้ในยานพาหนะขององค์กร',
                icon: 'car',
                colorClass: 'bg-blue-50',
                iconColor: 'text-blue-500',
                type: 'fuel'
            },
            'aircon': {
                title: 'ระบบปรับอากาศ (Air Conditioning)',
                desc: 'บันทึกการเติมน้ำยาแอร์และตรวจสอบการรั่วไหลของสารทำความเย็น',
                icon: 'wind',
                colorClass: 'bg-cyan-50',
                iconColor: 'text-cyan-500',
                type: 'refrigerant'
            },
            'fire-extinguisher': {
                title: 'ถังดับเพลิง (Fire Extinguishers)',
                desc: 'บันทึกการใช้งานหรือการเติมสารเคมีในถังดับเพลิงตามรอบตรวจสอบ',
                icon: 'flame-kindling',
                colorClass: 'bg-red-50',
                iconColor: 'text-red-500',
                type: 'refrigerant'
            }
        };

        function selectCategory(category) {
            console.log("Selected:", category);
        }

        //เข้าถึง supabase
        const { createClient } = supabase;
        const supabaseUrl = "https://ufglhklqraqudlxkylzw.supabase.co";
        const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ2xoa2xxcmFxdWRseGt5bHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NTY2MzUsImV4cCI6MjA4MjUzMjYzNX0._WxWgfvgonGFmQlXfLOSuKH4QqS6sWF3GOxnNPW6si8";
        const supabaseClient = createClient(supabaseUrl, supabaseKey);

            // ฟังก์ชัน Export 
        async function exportAllScopesToExcel() {
        const btn = event.currentTarget;
        const originalText = btn.innerText;
        btn.innerText = "กำลังดึงข้อมูล...";
        btn.disabled = true;

            try {
            // ดึงข้อมูลทั้ง 4 ตารางพร้อมกัน
            const [gen, fire, car, air] = await Promise.all([
                supabaseClient.from('scope1_generator').select('*').order('created_at', { ascending: false }),
                supabaseClient.from('scope1_fire').select('*').order('created_at', { ascending: false }),
                supabaseClient.from('scope1_car').select('*').order('created_at', { ascending: false }),
                supabaseClient.from('scope1_air').select('*').order('created_at', { ascending: false })
            ]);

            const wb = XLSX.utils.book_new();

            // 1. Generator Sheet
            const genData = [["เลขเครื่อง", "สถานที่", "เดือน", "เชื้อเพลิง", "วันที่เติม", "ปริมาตร (ลิตร)", "CO2", "CH4", "N2O", "Total (kgCO2e)"]];
            gen.data.forEach(i => genData.push([i.generator_number, i.location, i.month_fill, i.fuel_type, i.fill_Date, i.vol, i.total_co2, i.total_ch4, i.total_n2o, i.total_cf]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(genData), "1.Generator");

            // 2. Fire Extinguisher Sheet
            const fireData = [["ชั้น", "บริเวณที่ตั้ง", "ชนิดถัง", "ประเภทสาร", "ขนาด", "จำนวน", "เดือน", "วันที่", "ปริมาณ", "ใบกำกับภาษี", "Total (kgCO2e)"]];
            fire.data.forEach(i => fireData.push([i.floor, i.position, i.fire_type, i.agent_type, i.size, i.quantity, i.month, i.date, i.vol, i.tax_invoice, i.total_ef]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(fireData), "2.Fire_Extinguisher");

            // 3. Car Sheet
            const carData = [["ทะเบียนรถ", "ยี่ห้อ/รุ่น", "ประเภทรถ", "หน่วยงาน", "เชื้อเพลิง", "เดือน", "วันที่เติม", "ปริมาตร (ลิตร)", "Total (kgCO2e)"]];
            car.data.forEach(i => carData.push([i.car_registration, i.brand, i.car_type, i.agencies, i.fuel_type, i.month, i.date_fill, i.vol_fill, i.total_ef]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(carData), "3.Car_Usage");

            // 4. Air Sheet
            const airData = [["บริเวณที่ตั้ง", "ชั้น", "สถานที่ตั้ง", "ยี่ห้อ", "ประเภทเครื่อง", "ประเภทสาร", "เดือนที่เติม", "ปริมาตรที่เติม (kg)", "Total (kgCO2e)"]];
            air.data.forEach(i => airData.push([i.place, i.floor, i.location, i.brand, i.air_type, i.refrigerant, i.month, i.refill_qty, i.total_ef]));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(airData), "4.Air_Conditioning");

            XLSX.writeFile(wb, `CFO_SCOPE1_DATA.xlsx`);
         } catch (err) {
            alert("เกิดข้อผิดพลาดในการดึงข้อมูล: " + err.message);
            } finally {
            btn.innerText = originalText;
            btn.disabled = false;
         }
     }

    </script>
