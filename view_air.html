<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการบันทึก - CFO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- เพิ่มไลบรารีสำหรับ Export Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; }
        th { background: #f1f5f9; padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
    </style>
</head>
<body>

<nav class="bg-emerald-800 text-white p-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-xl font-bold">📊 ประวัติการบันทึก Air</h1>
        
        <div class="flex flex-wrap items-center gap-3">
            <!-- ปุ่ม Export Excel -->
            <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors flex items-center gap-2">
                📥Excel
            </button>
            <a href="form_air.html" class="bg-white text-emerald-800 px-4 py-2 rounded-lg font-bold hover:bg-emerald-50 transition-colors">
                + เพิ่มรายการใหม่ (Air)
            </a>
            <a href="index.html" class="bg-white text-emerald-800 px-4 py-2 rounded-lg font-bold hover:bg-emerald-50 transition-colors">
                หน้าแรก
            </a>
        </div>
    </div>
</nav>

<main class="max-w-8xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full" id="airTable">
                <thead>
                    <tr>
                        <th>บริเวณที่ตั้ง</th>
                        <th>ชั้น</th>
                        <th>สถานที่ตั้ง</th>
                        <th>ยี่ห้อ</th>
                        <th>บีทียู</th>
                        <th>ประเภทเครื่องปรับอากาศ</th>
                        <th>ประเภทสารทำความเย็น</th>
                        <th>ปริมาณสารทำความเย็น (g)</th>
                        <th>เดือนที่เติม</th>
                        <th>วันที่เติม</th>
                        <th>ปริมาตรที่เติม (kg)</th>
                        <th>Total (kgCO2e)</th>
                        <th>หลักฐาน</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="13" class="text-center py-20 text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const { createClient } = supabase;
    const supabaseUrl = "https://ufglhklqraqudlxkylzw.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ2xoa2xxcmFxdWRseGt5bHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NTY2MzUsImV4cCI6MjA4MjUzMjYzNX0._WxWgfvgonGFmQlXfLOSuKH4QqS6sWF3GOxnNPW6si8";
    const supabaseClient = createClient(supabaseUrl, supabaseKey);

    let currentData = []; // สำหรับเก็บข้อมูลที่จะ Export

    async function fetchHistory() {
        const { data, error } = await supabaseClient
            .from('scope1_air')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="13" class="text-center text-red-500">${error.message}</td></tr>`;
            return;
        }

        if (data) {
            currentData = data;
            document.getElementById('tableBody').innerHTML = data.map(row => `
                <tr class="hover:bg-slate-50">
                    <td>${row.place || '-'}</td>
                    <td>${row.floor || '-'}</td>
                    <td>${row.location || '-'}</td>
                    <td>${row.brand || '-'}</td>
                    <td>${row.btu || '-'}</td>
                    <td>${row.air_type || '-'}</td>
                    <td>${row.refrigerant || '-'}</td>
                    <td>${row.refrigerant_quantity || '0'}</td>
                    <td>${row.month || '-'}</td>
                    <td>${row.refill_date || '-'}</td>
                    <td>${row.refill_qty || '0'}</td>
                    <td class="font-bold text-emerald-700">${parseFloat(row.total_ef || 0).toFixed(4)}</td>
                    <td>
                        ${row.file_url ? `<a href="${row.file_url}" target="_blank" class="text-emerald-600 underline">เปิดดู</a>` : '<span class="text-slate-300">ไม่มี</span>'}
                    </td>
                </tr>
            `).join('');
        }
    }

    // ฟังก์ชัน Export เป็น Excel (.xlsx)
    function exportToExcel() {
        if (currentData.length === 0) return alert("ไม่มีข้อมูลสำหรับการ Export");

        // เตรียมหัวตารางสำหรับ Excel
        const worksheetData = [
            [
                "บริเวณที่ตั้ง", "ชั้น", "สถานที่ตั้ง", "ยี่ห้อ", "บีทียู", 
                "ประเภทเครื่องปรับอากาศ", "ประเภทสารทำความเย็น", "ปริมาณสารทำความเย็น (g)", 
                "เดือนที่เติม", "วันที่เติม", "ปริมาตรที่เติม (kg)", "Total (kgCO2e)"
            ]
        ];

        // วนลูปเพิ่มข้อมูลแต่ละแถว
        currentData.forEach(item => {
            worksheetData.push([
                item.place,
                item.floor,
                item.location,
                item.brand,
                item.btu,
                item.air_type,
                item.refrigerant,
                item.refrigerant_quantity,
                item.month,
                item.refill_date,
                item.refill_qty,
                item.total_ef
            ]);
        });

        // สร้างสมุดงาน (Workbook) และแผ่นงาน (Worksheet)
        const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Air_History");

        // ดาวน์โหลดไฟล์ Excel
        XLSX.writeFile(workbook, `Air_Maintenance_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    window.onload = () => {
        fetchHistory();
    };
</script>
</body>
</html>
