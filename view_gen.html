<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการบันทึก - CFO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- เพิ่มไลบรารีสำหรับ Export Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #f8fafc; }
        th { background: #f1f5f9; padding: 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }
    </style>
</head>
<body>

<nav class="bg-emerald-800 text-white p-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
        <h1 class="text-xl font-bold">📊 ประวัติการบันทึก Generator</h1>
        
        <div class="flex flex-wrap items-center gap-3">
            <!-- ปุ่ม Export ต่างๆ -->
            <button onclick="exportToExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors flex items-center gap-2">
                📥 Excel
            </button>
            <a href="form_gen.html" class="bg-white text-emerald-800 px-4 py-2 rounded-lg font-bold hover:bg-emerald-50 transition-colors">
                + เพิ่มรายการใหม่
            </a>
            <a href="index.html" class="bg-white text-emerald-800 px-4 py-2 rounded-lg font-bold hover:bg-emerald-50 transition-colors">
                หน้าแรก
            </a>
        </div>
    </div>
</nav>

<div class="max-w-xl mx-auto px-2 py-8">
    <div class="bg-green-100 rounded-2xl shadow-sm border border-slate-200 p-6 
                grid grid-cols-2 gap-4 justify-items-center">
        
        <div class="w-full md:w-64 h-32 border-2 border-slate-500 rounded-xl 
                    flex flex-col items-center justify-center bg-white">
            <span class="text-sm text-slate-500 font-medium">Total Diesel (Liters)</span>
            <span id="total_diesel" class="text-2xl font-bold text-emerald-800">0.00</span>
        </div>

        <div class="w-full md:w-64 h-32 border-2 border-slate-500 rounded-xl 
                    flex flex-col items-center justify-center bg-white">
            <span class="text-sm text-slate-500 font-medium">Total Gasoline (Liters)</span>
            <span id="total_gasoline" class="text-2xl font-bold text-orange-800">0.00</span>
        </div>
    </div>
</div>

<main class="max-w-8xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full" id="historyTable">
                <thead>
                    <tr>
                        <th>เลขเครื่อง</th>
                        <th>สถานที่</th>
                        <th>เดือน</th>
                        <th>เชื้อเพลิง</th>
                        <th>วันที่เติม</th>
                        <th>ปริมาตร (ลิตร)</th>
                        <th>CO2 (kg)</th>
                        <th>CH4 (kg)</th>
                        <th>N2O (kg)</th>
                        <th>Total (kgCO2e)</th>
                        <th>หลักฐาน</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="11" class="text-center py-20 text-slate-400">กำลังโหลดข้อมูล...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script>
    const { createClient } = supabase;
    const supabaseUrl = "https://ufglhklqraqudlxkylzw.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmZ2xoa2xxcmFxdWRseGt5bHp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY5NTY2MzUsImV4cCI6MjA4MjUzMjYzNX0._WxWgfvgonGFmQlXfLOSuKH4QqS6sWF3GOxnNPW6si8";
    const supabaseClient = createClient(supabaseUrl, supabaseKey);

    let currentData = []; // เก็บข้อมูลไว้สำหรับ Export

    async function fetchHistory() {
        const { data, error } = await supabaseClient
            .from('scope1_generator')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="11" class="text-center text-red-500">${error.message}</td></tr>`;
            return;
        }

        if (data) {
            currentData = data; // บันทึกข้อมูลเข้าตัวแปร global
            
            let sumDiesel = 0;
            let sumGasoline = 0;

            data.forEach(row => {
                const volume = parseFloat(row.vol) || 0;
                const fuel = row.fuel_type ? row.fuel_type.toLowerCase() : '';
                
                if (fuel.includes('diesel') || fuel.includes('ดีเซล')) {
                    sumDiesel += volume;
                } else if (fuel.includes('gasoline') || fuel.includes('เบนซิน') || fuel.includes('gas') || fuel.includes('แก๊ส')) {
                    sumGasoline += volume;
                }
            });

            document.getElementById('total_diesel').innerText = sumDiesel.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('total_gasoline').innerText = sumGasoline.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

            document.getElementById('tableBody').innerHTML = data.map(row => `
                <tr class="hover:bg-slate-50">
                    <td class="font-bold">${row.generator_number || '-'}</td>
                    <td>${row.location || '-'}</td>
                    <td>${row.month_fill || '-'}</td>
                    <td>${row.fuel_type || '-'}</td>
                    <td>${row.fill_Date || '-'}</td>
                    <td>${parseFloat(row.vol || 0).toLocaleString()}</td>
                    <td>${row.total_co2 ? parseFloat(row.total_co2).toFixed(4) : '0.0000'}</td>
                    <td>${row.total_ch4 ? parseFloat(row.total_ch4).toFixed(4) : '0.0000'}</td>
                    <td>${row.total_n2o ? parseFloat(row.total_n2o).toFixed(4) : '0.0000'}</td>
                    <td class="font-bold text-emerald-700">${parseFloat(row.total_cf || 0).toFixed(4)}</td>
                    <td>
                        ${row.file_url ? `<a href="${row.file_url}" target="_blank" class="text-emerald-600 underline">เปิดดู</a>` : '<span class="text-slate-300">ไม่มี</span>'}
                    </td>
                </tr>
            `).join('');
        }
    }

    // ฟังก์ชัน Export เป็น Excel (.xlsx)
    function exportToExcel() {
        if (currentData.length === 0) return alert("ไม่มีข้อมูลสำหรับการ Export");

        // เตรียมข้อมูลในรูปแบบ Array of Arrays สำหรับ Excel
        const worksheetData = [
            ["เลขเครื่อง", "สถานที่", "เดือน", "เชื้อเพลิง", "วันที่เติม", "ปริมาตร (ลิตร)", "CO2 (kg)", "CH4 (kg)", "N2O (kg)", "Total (kgCO2e)"]
        ];

        currentData.forEach(item => {
            worksheetData.push([
                item.generator_number,
                item.location,
                item.month_fill,
                item.fuel_type,
                item.fill_Date,
                item.vol,
                item.total_co2,
                item.total_ch4,
                item.total_n2o,
                item.total_cf
            ]);
        });

        const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Generator_History");

        // บันทึกไฟล์
        XLSX.writeFile(workbook, `Generator_Report_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    window.onload = () => {
        fetchHistory();
    };
</script>
</body>
</html>
